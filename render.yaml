# Render blueprint. Spins up a Dockerized web service, managed Postgres, and a
# Key Value (Redis) instance. The free web tier has no separate worker dynos, so
# the start command runs gunicorn + Celery worker + beat together via honcho
# (see Procfile) — a demo compromise; production splits these into their own
# services as in docker-compose.yml.

services:
  - type: web
    name: ahoum-events-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /healthz/
    # The entrypoint runs migrations/collectstatic/seed (RUN_MIGRATIONS=1),
    # then honcho starts all three processes in the one container.
    dockerCommand: honcho start
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: RUN_MIGRATIONS
        value: "1"
      - key: SEED_DEMO
        value: "1"
      - key: EMAIL_URL
        value: consolemail://
      - key: DATABASE_URL
        fromDatabase:
          name: ahoum-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: ahoum-redis
          property: connectionString

  - type: keyvalue
    name: ahoum-redis
    plan: free
    ipAllowList: []

databases:
  - name: ahoum-db
    plan: free
    databaseName: ahoum
    user: ahoum
